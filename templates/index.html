<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosy Nabo</title>
  <meta name="description" content="Slå op på dansk ejendomsdata: hæftelser, ejere, vurdering, matrikel og salgshistorik.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Nosy Nabo">
  <meta property="og:description" content="Slå op på dansk ejendomsdata: hæftelser, ejere, vurdering, matrikel og salgshistorik.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nosy.dossing.net/">
  <meta property="og:image" content="https://nosy.dossing.net/favicon.svg">
  <link rel="preconnect" href="https://api.dataforsyningen.dk" crossorigin>
  <link rel="preconnect" href="https://a.tile.openstreetmap.org" crossorigin>
  <link rel="preconnect" href="https://b.tile.openstreetmap.org" crossorigin>
  <link rel="preconnect" href="https://c.tile.openstreetmap.org" crossorigin>
  <!-- Leaflet 1.9.4 — self-hosted from /static/leaflet/. See static/leaflet/VERSION. -->
  <link rel="stylesheet" href="/static/leaflet/leaflet.css?v={{VERSION}}"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="stylesheet" href="/static/style.css?v={{VERSION}}"/>
  <script>
    // Apply theme before render to avoid flash
    (function() {
      const t = localStorage.getItem('nosy-theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

<h1 class="visually-hidden">Nosy Nabo — dansk ejendomsopslag</h1>

<!-- Mobile sidebar controls. Hidden on >=768px by CSS. -->
<button id="sidebar-toggle" class="sidebar-toggle" type="button"
        aria-label="Vis søgning og resultater" aria-controls="sidebar" aria-expanded="false"
        onclick="toggleSidebarMobile()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div id="sidebar-backdrop" class="sidebar-backdrop" onclick="closeSidebarMobile()" aria-hidden="true"></div>

<div id="sidebar">
  <div id="search-box">
    <input id="search-input" type="text" placeholder="Søg adresse… (fx Stålhøjen 24 Risskov)" autocomplete="off"/>
    <button class="history-btn" onclick="toggleHistory()" title="Søgehistorik" aria-label="Søgehistorik"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
    <button class="darkmode-btn" id="darkmode-btn" onclick="toggleTheme()" title="Skift tema" aria-label="Skift tema"></button>
    <div id="suggestions" style="display:none"></div>
    <div id="history-dropdown"></div>
  </div>
  <div id="results">
    <div class="empty-state">
      <img class="empty-logo" src="/favicon.svg" alt="" aria-hidden="true">
      <strong>Nosy Nabo</strong>
      Søg på en adresse eller klik på kortet.<br>Op til 10 adresser ad gangen.
    </div>
  </div>
  <div id="sidebar-footer">
    <a class="footer-link" href="/readme">Readme</a>
    <button id="clear-btn" class="clear-btn" hidden onclick="clearResults()">Ryd resultater</button>
  </div>
</div>

<div id="map"></div>

<!-- Leaflet 1.9.4 — self-hosted from /static/leaflet/.
     To upgrade: bump the version in static/leaflet/VERSION and re-run the
     download steps documented there. -->
<script src="/static/leaflet/leaflet.js?v={{VERSION}}"></script>
<script>
// ── Map setup ──────────────────────────────────────────────────────────────
const map = L.map('map').setView([56.0, 10.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// entries: [{ label, lat, lng, data, error, loading, marker }]
const entries = [];

// ── Mobile sidebar drawer ────────────────────────────────────────────────
// Below 768px the sidebar is an off-canvas drawer. body.sidebar-open is the
// single source of truth; CSS transitions the translateX.
function isMobileViewport() {
  // Keep in sync with the @media rules in style.css.
  return window.matchMedia('(max-width: 767px), (max-height: 500px) and (max-width: 900px)').matches;
}
function openSidebarMobile() {
  if (!isMobileViewport()) return;
  document.body.classList.add('sidebar-open');
  const btn = document.getElementById('sidebar-toggle');
  if (btn) btn.setAttribute('aria-expanded', 'true');
}
function closeSidebarMobile() {
  document.body.classList.remove('sidebar-open');
  const btn = document.getElementById('sidebar-toggle');
  if (btn) btn.setAttribute('aria-expanded', 'false');
  // Let the drawer finish sliding out, then tell Leaflet to re-measure.
  setTimeout(() => { if (window.map && map.invalidateSize) map.invalidateSize(); }, 300);
}
function toggleSidebarMobile() {
  if (document.body.classList.contains('sidebar-open')) {
    closeSidebarMobile();
  } else {
    document.body.classList.add('sidebar-open');
    const btn = document.getElementById('sidebar-toggle');
    if (btn) btn.setAttribute('aria-expanded', 'true');
  }
}
// Some mobile browsers (observed on MIUI/Chrome on Xiaomi) fail to fire a
// synthetic click after touchstart if any micro-movement occurs, because the
// gesture detector claims the sequence. Bind touchend explicitly as a
// fallback and guard against double-fire with a short cooldown.
(function bindSidebarToggleRobust() {
  let lastFire = 0;
  function fire(e) {
    const now = Date.now();
    if (now - lastFire < 400) return; // de-dup click + touchend
    lastFire = now;
    if (e && e.cancelable) e.preventDefault();
    try { toggleSidebarMobile(); } catch (err) { console.error('toggle failed', err); }
  }
  function attach() {
    const btn = document.getElementById('sidebar-toggle');
    if (!btn) { setTimeout(attach, 50); return; }
    // Remove inline onclick so we own the event entirely.
    btn.onclick = null;
    btn.addEventListener('click', fire);
    btn.addEventListener('touchend', fire, { passive: false });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attach);
  } else {
    attach();
  }
})();
// Close drawer on viewport resize into desktop range (e.g. orientation change).
window.addEventListener('resize', () => {
  if (!isMobileViewport() && document.body.classList.contains('sidebar-open')) {
    closeSidebarMobile();
  }
});

let loanAssumption = 'deferred_10y';

function setLoanAssumption(type) {
  loanAssumption = type;
  renderSidebar();
}

function loanAgeMonths(alias) {
  const datePart = alias ? alias.split('-')[0] : null;
  if (!datePart) return null;
  try {
    const [d, m, y] = datePart.split('.').map(Number);
    const reg = new Date(y, m - 1, d);
    if (isNaN(reg.getTime())) return null;
    const now = new Date();
    // Bug 13: use day-difference for more accurate month count (avg 30.44 days/month)
    const dayDiff = (now - reg) / 86400000;
    if (dayDiff < 0) return null;
    return Math.round(dayDiff / 30.44);
  } catch { return null; }
}

function outstandingBalance(principal, annualRatePct, monthsElapsed, type) {
  if (monthsElapsed === null || monthsElapsed <= 0) return principal;
  const r = annualRatePct / 100 / 12;

  function annuityRemaining(P, r, n, k) {
    k = Math.min(k, n);
    if (k >= n) return 0;
    if (r === 0) return P * (n - k) / n;
    return P * (Math.pow(1 + r, n) - Math.pow(1 + r, k)) / (Math.pow(1 + r, n) - 1);
  }

  if (type === 'interest_only') return principal;
  if (type === 'repayment')     return annuityRemaining(principal, r, 360, monthsElapsed);
  if (type === 'deferred_10y') {
    if (monthsElapsed <= 120) return principal;
    return annuityRemaining(principal, r, 240, monthsElapsed - 120);
  }
  return principal;
}

function numberedIcon(n) {
  return L.divIcon({
    html: `<div class="map-pin">${n}</div>`,
    className: '',
    iconSize: [26, 26],
    iconAnchor: [13, 13],
    popupAnchor: [0, -14],
  });
}

map.on('click', async e => {
  if (entries.length >= 10) return;
  const { lat, lng } = e.latlng;
  const res = await fetch(`/api/reverse?lat=${lat}&lng=${lng}`);
  if (!res.ok) return;
  const addr = await res.json();
  input.value = '';
  addAddress(addr.label, addr.lat, addr.lng);
});

// ── Autocomplete ───────────────────────────────────────────────────────────
const input = document.getElementById('search-input');
const suggestionsEl = document.getElementById('suggestions');
let debounceTimer;
let currentSuggestions = [];

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = input.value.trim();
  if (q.length < 3) { hideSuggestions(); return; }
  debounceTimer = setTimeout(() => fetchSuggestions(q), 200);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Escape') { hideSuggestions(); hideHistory(); }
  if (e.key === 'Enter' && currentSuggestions.length > 0) {
    selectSuggestion(currentSuggestions[0]);
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-box')) { hideSuggestions(); hideHistory(); }
});

async function fetchSuggestions(q) {
  hideHistory();
  const res = await fetch(`/api/autocomplete?q=${encodeURIComponent(q)}`);
  currentSuggestions = await res.json();
  if (!currentSuggestions.length) { hideSuggestions(); return; }
  suggestionsEl.innerHTML = currentSuggestions
    .map((s, i) => `<div class="suggestion" data-i="${i}">${esc(s.label)}</div>`)
    .join('');
  suggestionsEl.style.display = 'block';
  suggestionsEl.querySelectorAll('.suggestion').forEach(el => {
    el.addEventListener('click', () => selectSuggestion(currentSuggestions[+el.dataset.i]));
  });
}

function hideSuggestions() {
  suggestionsEl.style.display = 'none';
}

function selectSuggestion(s) {
  input.value = '';
  hideSuggestions();
  if (entries.length >= 10) return;
  map.setView([s.lat, s.lng], 16);
  addAddress(s.label, s.lat, s.lng);
}

// ── Multi-address management ───────────────────────────────────────────────
async function addAddress(label, lat, lng) {
  // Bug 9: reject duplicates (same label already in the list)
  if (entries.some(e => e.label === label)) {
    openSidebarMobile();  // still surface existing entry on duplicate tap
    return;
  }
  openSidebarMobile();
  const idx = entries.length;
  const marker = L.marker([lat, lng], { icon: numberedIcon(idx + 1) }).addTo(map);
  marker.on('click', () => { openSidebarMobile(); scrollToEntry(idx); });

  const entry = {
    label, lat, lng,
    data: null, error: null, loading: true, status: null,
    marker, salesHistory: null, salesLoading: true,
  };
  entries.push(entry);
  renderSidebar();
  scrollToEntry(idx);

  await loadEntry(entry);
  scrollToEntry(entries.indexOf(entry));

  // Fetch sales history in the background; re-render when done.
  fetch(`/api/sales-history?q=${encodeURIComponent(label)}`)
    .then(r => r.ok ? r.json() : null)
    .then(sh => { entry.salesHistory = sh; })
    .catch(() => { /* ignore — optional enrichment */ })
    .finally(() => {
      // Bug 14: entry may have been removed while fetch was in flight
      if (!entries.includes(entry)) return;
      entry.salesLoading = false;
      renderSidebar();
    });
}

// Fetch /api/lookup for an entry, with one automatic retry on 5xx/network
// errors. On slow upstream tinglysning.dk we want to be patient rather than
// give up — the backend already caps each request at 45s and retries once
// on timeout, so worst-case per attempt is ~1.5 min.
async function loadEntry(entry) {
  entry.loading = true;
  entry.error = null;
  entry.status = 'loading';
  renderSidebar();

  const shouldRetry = (res, err) => {
    if (err) return true;                    // network / abort
    if (!res) return true;
    if (res.status >= 500) return true;      // 502/504 from our backend
    return false;
  };

  for (let attempt = 0; attempt < 2; attempt++) {
    let res = null, err = null, body = null;
    try {
      res = await fetch(`/api/lookup?q=${encodeURIComponent(entry.label)}`);
    } catch (e) {
      err = e;
    }

    if (res && res.ok) {
      try {
        entry.data = await res.json();
        entry.error = null;
        entry.status = 'ok';
        saveToHistory(entry.label, entry.lat, entry.lng);
        const owners = (entry.data.ejere || []).map(e => `${esc(e.navn)} (${esc(e.andel)})`).join('<br>');
        entry.marker.bindPopup(`<div class="popup-address">${esc(entry.data.adresse)}</div><div class="popup-owners">${owners}</div>`);
      } catch {
        entry.error = 'Uventet svar fra serveren.';
        entry.status = 'error';
      }
      entry.loading = false;
      renderSidebar();
      return;
    }

    // Non-OK or network error. Try to extract a message.
    if (res) {
      try { body = await res.json(); } catch { /* ignore */ }
    }

    if (attempt === 0 && shouldRetry(res, err) && entries.includes(entry)) {
      // Show a retry banner and wait 3s before trying again.
      entry.status = 'retrying';
      entry.error = null;
      renderSidebar();
      await new Promise(r => setTimeout(r, 3000));
      if (!entries.includes(entry)) return;  // user removed it while waiting
      continue;
    }

    // Final failure.
    entry.error = (body && body.detail) ||
                  (err ? 'Kunne ikke kontakte serveren.' : `Serverfejl (HTTP ${res.status})`);
    entry.status = 'error';
    entry.loading = false;
    renderSidebar();
    return;
  }
}

// Called from the "Prøv igen" button in the sidebar.
function retryEntry(i) {
  const entry = entries[i];
  if (!entry) return;
  loadEntry(entry);
}

function removeEntry(i) {
  map.removeLayer(entries[i].marker);
  entries.splice(i, 1);
  entries.forEach((e, j) => {
    e.marker.setIcon(numberedIcon(j + 1));
    e.marker.off('click');
    e.marker.on('click', () => scrollToEntry(j));
  });
  renderSidebar();
}

// Remove all results: cards, map markers, and the search input. Preserves
// theme and localStorage history.
function clearResults() {
  entries.forEach(e => { if (e.marker) map.removeLayer(e.marker); });
  entries.length = 0;
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  const sugg = document.getElementById('suggestions');
  if (sugg) sugg.style.display = 'none';
  map.setView([56.0, 10.5], 7);
  renderSidebar();
}

function scrollToEntry(idx) {
  const el = document.getElementById(`entry-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('results');
  const clearBtn = document.getElementById('clear-btn');
  if (entries.length === 0) {
    el.innerHTML = `<div class="empty-state"><img class="empty-logo" src="/favicon.svg" alt="" aria-hidden="true"><strong>Nosy Nabo</strong>Søg på en adresse eller klik på kortet.<br>Op til 10 adresser ad gangen.</div>`;
    if (clearBtn) clearBtn.hidden = true;
    return;
  }

  if (clearBtn) clearBtn.hidden = false;
  el.innerHTML = '';

  if (entries.length >= 10) {
    el.appendChild(html('<div class="limit-notice">Maks. 10 adresser nået — fjern en for at tilføje nye.</div>'));
  }

  entries.forEach((entry, i) => {
    const section = document.createElement('div');
    section.id = `entry-${i}`;

    section.appendChild(html(`
      <div class="entry-header">
        <span class="entry-num">${i + 1}</span>
        <span class="entry-label">${esc(entry.label)}</span>
        <button class="entry-remove" onclick="removeEntry(${i})" title="Fjern">×</button>
      </div>
    `));

    if (entry.loading) {
      if (entry.status === 'retrying') {
        section.appendChild(html('<div class="spinner">Tinglysning.dk svarer langsomt — forsøger igen om et øjeblik…</div>'));
      } else {
        section.appendChild(html('<div class="spinner">Henter fra tinglysning.dk…</div>'));
      }
    } else if (entry.error) {
      section.appendChild(html(`
        <div style="color:#dc2626;padding:4px 0 10px">
          ${esc(entry.error)}
          <button class="retry-btn" onclick="retryEntry(${i})">Prøv igen</button>
        </div>
      `));
    } else if (entry.data) {
      renderEntryCards(section, entry.data, entry.salesHistory);
      if (entry.salesLoading) {
        section.appendChild(html('<div class="spinner">Henter salgshistorik fra Boligsiden…</div>'));
      }
    }

    el.appendChild(section);
    if (i < entries.length - 1) {
      el.appendChild(html('<hr class="entry-divider">'));
    }
  });
}

function renderEntryCards(container, d, salesHistory) {
  const hasAndelsbolig = !!d.andelsbolig;
  const hasEjendomsbog = !!(d.uuid && d.ejendomstype);

  if (hasAndelsbolig) {
    // Addresses that exist in Andelsboligbogen are cooperative dwellings.
    // Explain the two-book structure up front so the reader understands why
    // we show both the association's property and the member's individual
    // share below.
    container.appendChild(html(`
      <div class="card" style="border-left:3px solid #2563eb;background:#eff6ff">
        <div class="card-title" style="color:#1d4ed8">Andelsbolig</div>
        <div style="font-size:13px;line-height:1.5">
          Denne adresse er registreret i <strong>Andelsboligbogen</strong>.
          ${hasEjendomsbog
            ? "Nedenfor vises både andelsforeningens fælles ejendom (fra Ejendomsbogen) og andelshaverens individuelle hæftelser (fra Andelsboligbogen)."
            : "Andelshaverens individuelle hæftelser vises nedenfor. Andelsforeningens fælles ejendom kunne ikke lokaliseres i Ejendomsbogen."}
        </div>
      </div>
    `));
  } else if (d._matrikel_fallback) {
    // Non-cooperative umbrella property: hospital, large farm, institution,
    // or an address that shares its matrikel with a parent property.
    const fb = d._matrikel_fallback;
    container.appendChild(html(`
      <div class="card" style="border-left:3px solid #d97706;background:#fffbeb">
        <div class="card-title" style="color:#92400e">Fællesejendom / paraplyejendom</div>
        <div style="font-size:13px;line-height:1.5">
          Den søgte adresse har ikke sin egen tingbog. Tingbogen nedenfor dækker
          hele ejendommen (matrikel <strong>${esc(fb.matrikelnr)}</strong>,
          ejerlav ${esc(fb.ejerlavskode)}), som typisk er en institution,
          almen boligorganisation eller anden paraplyejendom.
          ${fb.parent_adresse ? `Hovedadresse: <strong>${esc(fb.parent_adresse)}</strong>.` : ''}
        </div>
      </div>
    `));
  }

  if (hasEjendomsbog) {
    container.appendChild(html(`
      <div class="card">
        <div class="address-header">${esc(d.adresse)}</div>
        <div class="property-type">${esc(d.ejendomstype)}</div>
      </div>
    `));
  }

  if (d.matrikler?.length) {
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Matrikler</div>
        <table>${d.matrikler.map(m => `
          <tr><td>${esc(m.matrikelnummer)}</td><td>${esc(m.landsejerlavnavn)}</td></tr>
        `).join('')}</table>
      </div>
    `));
  }

  if (d.vurdering) {
    const v = d.vurdering;
    const totalDebt = (d.haeftelser || []).reduce((sum, h) => {
      const principal = parseKr(h.hovedstol);
      const rate = parseFloat(h.rente) || 0;
      const months = loanAgeMonths(h.alias);
      const isRealkredit = ['Realkreditpantebrev', 'Afgiftspantebrev'].includes(h.haeftelsestype);
      if (isRealkredit && months !== null && rate > 0) {
        return sum + outstandingBalance(principal, rate, months, loanAssumption);
      }
      return sum + principal;
    }, 0);
    const frivaerdi = v.ejendomsvaerdi - totalDebt;
    const frivaerdiPct = v.ejendomsvaerdi > 0 ? Math.round(frivaerdi / v.ejendomsvaerdi * 100) : null;
    const frivaerdiColor = frivaerdi < 0 ? '#dc2626' : '#166534';
    const assumptionLabels = { interest_only: 'Afdragsfri', deferred_10y: '10 år afdragsfri', repayment: 'Med afdrag' };
    const debtRow = totalDebt > 0 ? `
      <tr><td colspan="2">
        <div class="assumption-tabs">
          ${Object.entries(assumptionLabels).map(([k, lbl]) => `<div class="assumption-tab${loanAssumption === k ? ' active' : ''}" onclick="setLoanAssumption('${k}')">${lbl}</div>`).join('')}
        </div>
      </td></tr>
      <tr><td>Samlet pant (est.)</td><td>${fmt(Math.round(totalDebt))} kr.</td></tr>
      <tr><td>Friværdi (est.)</td><td style="color:${frivaerdiColor};font-weight:700">${fmt(Math.round(frivaerdi))} kr.${frivaerdiPct !== null ? ` <span style="color:#6b7280;font-weight:400">(${frivaerdiPct}%)</span>` : ''}</td></tr>
    ` : `
      <tr><td>Samlet pant</td><td style="color:#6b7280;font-style:italic">— Ingen gæld —</td></tr>
      <tr><td>Friværdi</td><td style="color:#166534;font-weight:700">${fmt(v.ejendomsvaerdi)} kr. <span style="color:#6b7280;font-weight:400">(100%)</span></td></tr>
    `;
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Vurdering (${esc(v.vurderingsdato)})</div>
        <table>
          <tr><td>Ejendomsværdi</td><td>${fmt(v.ejendomsvaerdi)} kr.</td></tr>
          <tr><td>Grundværdi</td><td>${fmt(v.grundvaerdi)} kr.</td></tr>
          <tr><td>Kommune</td><td>${esc(v.kommune)}</td></tr>
          ${debtRow}
        </table>
      </div>
    `));
  }

  if (d.ejere?.length) {
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Ejere</div>
        <table>${d.ejere.map(e => `
          <tr><td>${esc(e.andel)}</td><td>${esc(e.navn)}</td></tr>
        `).join('')}</table>
      </div>
    `));
  }

  if (d.haeftelser?.length) {
    const card = html('<div class="card"><div class="card-title">Hæftelser</div></div>');
    d.haeftelser.forEach(h => card.appendChild(renderMortgage(h)));
    container.appendChild(card);
  }

  if (d.andelsbolig) {
    const a = d.andelsbolig;
    const shareLiens = a.haeftelser || [];
    const header = hasEjendomsbog
      ? 'Andelshaverens hæftelser <span style="color:#6b7280;font-weight:400;font-size:11px">(Andelsboligbogen — på andelen)</span>'
      : 'Hæftelser <span style="color:#6b7280;font-weight:400;font-size:11px">(Andelsboligbogen)</span>';
    if (shareLiens.length) {
      const card = html(`<div class="card" style="border-left:3px solid #2563eb"><div class="card-title">${header}</div></div>`);
      shareLiens.forEach(h => card.appendChild(renderMortgage(h)));
      container.appendChild(card);
    } else {
      container.appendChild(html(`
        <div class="card" style="border-left:3px solid #2563eb">
          <div class="card-title">${header}</div>
          <div style="font-size:13px;color:#6b7280">Ingen hæftelser tinglyst på andelen.</div>
        </div>
      `));
    }
  }

  if (d.servitutter?.length) {
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Servitutter</div>
        ${d.servitutter.map(s => `<div class="easement">[${esc(s.prioritet)}] ${esc(s.tekst)}</div>`).join('')}
      </div>
    `));
  }

  if (salesHistory?.registrations?.length) {
    const monthsDa = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
    const shortDate = (iso) => {
      if (!iso) return '';
      const [y, m] = iso.split('-');
      return `${monthsDa[parseInt(m, 10) - 1] || m} ${y}`;
    };
    const rows = salesHistory.registrations.map(r => {
      const pricePerM2 = r.perAreaPrice ? `${fmt(r.perAreaPrice)} kr/m²` : '—';
      return `<tr>
        <td>${shortDate(r.date)}</td>
        <td class="num">${fmt(r.amount)} kr.</td>
        <td class="num">${pricePerM2}</td>
        <td>${esc(r.typeLabel || '')}</td>
      </tr>`;
    }).join('');
    container.appendChild(html(`
      <div class="card">
        <div class="card-title">Salgshistorik <span style="color:#6b7280;font-weight:400;font-size:11px">(via Boligsiden)</span></div>
        <table class="sales-history">
          <thead><tr><th>Dato</th><th style="text-align:right">Pris</th><th style="text-align:right">Pris/m²</th><th>Type</th></tr></thead>
          ${rows}
        </table>
      </div>
    `));
  }
}

function renderMortgage(h) {
  const creditors = (h.kreditorer || []).join(', ');
  const isVariable = h.fastvariabel === 'variabel';
  const regDate = h.alias ? h.alias.split('-')[0] : null;
  const lti = h.loan_type_info;

  let badgeHtml = '';
  let candidatesHtml = '';

  if (lti && isVariable) {
    if (lti.source === 'isin') {
      badgeHtml = `<span class="loan-type-badge badge-certain">${esc(lti.loan_type)} (ISIN)</span>`;
    } else if (lti.source === 'estimated') {
      if (lti.uncertain) {
        badgeHtml = `<span class="loan-type-badge badge-uncertain">Usikker (lav rente — ældre lån?)</span>`;
      } else {
        const cls = lti.close_to?.length ? 'badge-close' : 'badge-certain';
        const closeStr = lti.close_to?.length ? ` — tæt på ${esc(lti.close_to.join(', '))}` : '';
        badgeHtml = `<span class="loan-type-badge ${cls}">${esc(lti.loan_type)}${closeStr}</span>`;
      }

      if (lti.candidates?.length) {
        const maxDelta = Math.max(...lti.candidates.map(c => c.delta));
        candidatesHtml = `<div class="candidates">${lti.candidates.map((c, i) => `
          <div class="candidate ${i === 0 ? 'best' : ''}">
            <span>${esc(c.name)}</span>
            <span>Δ ${c.delta.toFixed(4)}%</span>
          </div>
          <div class="delta-bar-wrap"><div class="delta-bar" style="width:${maxDelta > 0 ? Math.round((1 - c.delta / maxDelta) * 100) : 100}%"></div></div>
        `).join('')}</div>`;
      }
    }
  }

  return html(`
    <div class="mortgage">
      <div class="mortgage-header">
        <span class="mortgage-type">[${esc(h.prioritet)}] ${esc(h.haeftelsestype)}</span>
        <span class="mortgage-amount">${esc(h.hovedstol)}</span>
      </div>
      <div class="mortgage-meta">
        ${esc(h.rente)}% · ${isVariable ? 'variabel' : 'fast'}
        ${creditors ? ' · ' + creditors : ''}
        ${regDate ? ' · ' + regDate : ''}
      </div>
      ${badgeHtml}
      ${candidatesHtml}
    </div>
  `);
}

function fmt(n) {
  return n.toLocaleString('da-DK');
}

function parseKr(s) {
  // "1.200.000 kr." → 1200000 (Danish thousands separator is '.')
  return parseInt(String(s || '').replace(/\./g, '').replace(/\s*kr\.?/i, '').trim(), 10) || 0;
}

function html(str) {
  const t = document.createElement('template');
  t.innerHTML = str.trim();
  return t.content.firstChild;
}

// HTML-escape helper. Use for anything that comes from upstream APIs
// (owner names, addresses, easement texts, error messages from the
// backend) or from localStorage before interpolating it into a
// template literal. Prevents <, >, & and quote injection.
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Dark mode ─────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('nosy-theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('nosy-theme', 'dark');
  }
  updateThemeIcon();
}

function updateThemeIcon() {
  const btn = document.getElementById('darkmode-btn');
  if (!btn) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.innerHTML = isDark
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}
updateThemeIcon();

// ── Search history (localStorage) ─────────────────────────────────────────
const HISTORY_KEY = 'nosy-history';
const HISTORY_MAX = 50;
const historyDropdown = document.getElementById('history-dropdown');

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}

function saveToHistory(label, lat, lng) {
  let hist = loadHistory();
  hist = hist.filter(h => h.label !== label);
  hist.unshift({ label, lat, lng, ts: Date.now() });
  if (hist.length > HISTORY_MAX) hist = hist.slice(0, HISTORY_MAX);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  hideHistory();
}

function toggleHistory() {
  hideSuggestions();
  if (historyDropdown.style.display === 'block') {
    hideHistory();
  } else {
    renderHistory();
    historyDropdown.style.display = 'block';
  }
}

function hideHistory() {
  historyDropdown.style.display = 'none';
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (mins < 1) return 'lige nu';
  if (mins < 60) return `${mins} min siden`;
  if (hours < 24) return `${hours} time${hours > 1 ? 'r' : ''} siden`;
  if (days === 1) return 'i går';
  if (days < 7) return `${days} dage siden`;
  const d = new Date(ts);
  return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short' });
}

function renderHistory() {
  const hist = loadHistory();
  if (hist.length === 0) {
    historyDropdown.innerHTML = '<div class="history-empty">Ingen historik endnu</div>';
    return;
  }
  historyDropdown.innerHTML = hist.map((h, i) => `
    <div class="history-entry" data-i="${i}">
      <span class="history-label">${esc(h.label)}</span>
      <span class="history-time">${esc(timeAgo(h.ts))}</span>
    </div>
  `).join('') + '<button class="history-clear" onclick="clearHistory()">Ryd historik</button>';

  historyDropdown.querySelectorAll('.history-entry').forEach(el => {
    el.addEventListener('click', () => {
      const h = hist[+el.dataset.i];
      hideHistory();
      if (entries.length >= 10) return;
      map.setView([h.lat, h.lng], 16);
      addAddress(h.label, h.lat, h.lng);
    });
  });
}
